<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Mindras Eugen Traian">
    <meta name="description" content="esempio di pagina contenente un form">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Esercizio Form</title>
    <link rel="stylesheet" href="./src/css/style.css">
</head>
<body>
        <form >
            <div class="container">
                <h1>Form for Anya</h1>
                <p>Compila i cmapi qui sotto:</p>
                <div class="name card">
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name_user" placeholder="Insert Your Name" required>
                </div>
                <div class="email card">
                    <label for="email">Mail</label>
                    <input type="email" name="email" id="email" placeholder="Insert Your Email" required>
                </div>
                <div class="message card">
                    <label for="message">Message</label>
                    <textarea name="meassage" id="message" placeholder="Insert Your Message Here" required></textarea>
                </div>
                <div class="card privacy">
                    <input type="checkbox" name="checkbox" id="checkbox">
                    <label for="checkbox" class="checkbox">“Acconsento al trattamento dei miei dati personali secondo l’informativa privacy e il Regolamento (UE) 2016/679 (GDPR).”</label>
                </div>
                <button type="submit" name="submit">Send</button>
            </div>
        </form>
</body>
</html>
